<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成管理员 API Key</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .api-key {
            background: #fff;
            padding: 15px;
            border-radius: 6px;
            word-break: break-all;
            font-family: monospace;
            margin: 15px 0;
            border: 2px solid #667eea;
        }

        .copy-btn {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        .warning {
            background: #fff3cd;
            padding: 15px;
            border-radius: 6px;
            color: #856404;
            margin-top: 15px;
        }

        .error {
            background: #f8d7da;
            padding: 15px;
            border-radius: 6px;
            color: #721c24;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 生成管理员 API Key</h1>
        <p>输入管理员密钥以生成 API Key</p>

        <form id="generateForm">
            <div class="form-group">
                <label>管理员密钥</label>
                <input type="password" id="adminSecret" placeholder="输入 ADMIN_SECRET" required>
            </div>
            <button type="submit" class="btn">生成 API Key</button>
        </form>

        <div id="result" class="result">
            <h3>✅ 管理员 API Key 已生成</h3>
            <div class="api-key" id="apiKeyDisplay"></div>
            <button class="copy-btn" onclick="copyKey()">复制 API Key</button>
            
            <div class="warning">
                <strong>⚠️ 重要提示：</strong>
                <ul style="margin-top: 10px; margin-left: 20px;">
                    <li>请妥善保管此 API Key</li>
                    <li>此 Key 拥有完整的管理员权限</li>
                    <li>可以查看所有订单和客户信息</li>
                    <li>可以更新订单状态和发货信息</li>
                    <li>不要分享给未授权人员</li>
                </ul>
            </div>

            <h4 style="margin-top: 20px;">使用方法：</h4>
            <p style="color: #666; margin-top: 10px;">
                在请求管理后台 API 时，添加 HTTP Header：<br>
                <code style="background: #f0f0f0; padding: 5px 10px; border-radius: 4px; display: inline-block; margin-top: 5px;">
                    X-Admin-Key: [您的管理员 API Key]
                </code>
            </p>
        </div>

        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        let generatedKey = '';

        document.getElementById('generateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const secret = document.getElementById('adminSecret').value;
            const errorDiv = document.getElementById('error');
            const resultDiv = document.getElementById('result');

            errorDiv.style.display = 'none';
            resultDiv.classList.remove('show');

            try {
                const response = await fetch(`${API_BASE_URL}/api/admin/auth`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ secret })
                });

                const data = await response.json();

                if (data.success) {
                    generatedKey = data.data.admin_key;
                    document.getElementById('apiKeyDisplay').textContent = generatedKey;
                    resultDiv.classList.add('show');
                } else {
                    errorDiv.textContent = '❌ ' + data.error;
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = '❌ 网络错误: ' + error.message;
                errorDiv.style.display = 'block';
            }
        });

        function copyKey() {
            navigator.clipboard.writeText(generatedKey).then(() => {
                alert('✅ API Key 已复制到剪贴板！');
            });
        }
    </script>
</body>
</html>
