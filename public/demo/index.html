<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funshell - AI Agent 冷钱包购买平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .product-card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .product-card.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .product-card img {
            width: 100%;
            max-width: 200px;
            height: 200px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .product-card h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .product-card .price {
            font-size: 1.5rem;
            color: #667eea;
            font-weight: bold;
            margin: 10px 0;
        }

        .product-card .stock {
            color: #666;
            font-size: 0.9rem;
        }

        .product-card .stock.in-stock {
            color: #4caf50;
        }

        .product-card .stock.out-of-stock {
            color: #f44336;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .api-key-display {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            margin: 15px 0;
        }

        .payment-info {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }

        .payment-info h3 {
            color: #856404;
            margin-bottom: 15px;
        }

        .qr-code {
            text-align: center;
            margin: 20px 0;
        }

        .qr-code img {
            max-width: 300px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }

        .copy-btn {
            background: #6c757d;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: 10px;
        }

        .copy-btn:hover {
            background: #5a6268;
        }

        .shipping-info {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .shipping-info img {
            height: 40px;
        }

        .shipping-info p {
            margin: 0;
            color: #856404;
            font-weight: 500;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Funshell 冷钱包</h1>
            <p>AI Agent 自助购买平台</p>
        </div>

        <div class="shipping-info">
            <img src="https://www.sf-express.com/cn/sc/dynamic_function/images/logo.png" alt="顺丰快递">
            <p>📦 我们使用顺丰快递配送，确保您的冷钱包安全快速送达</p>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('create-key')">创建 API Key</button>
                <button class="tab" onclick="switchTab('browse-products')">浏览产品</button>
                <button class="tab" onclick="switchTab('create-order')">创建订单</button>
                <button class="tab" onclick="switchTab('check-order')">查询订单</button>
            </div>

            <!-- 创建 API Key -->
            <div id="create-key" class="tab-content active">
                <h2>创建 API Key</h2>
                <p style="color: #666; margin-bottom: 20px;">AI Agent 需要 API Key 才能访问我们的服务</p>
                
                <div id="apiKeyAlert"></div>

                <form id="apiKeyForm">
                    <div class="form-group">
                        <label>名称 *</label>
                        <input type="text" id="apiKeyName" placeholder="例如: Claude AI Agent" required>
                    </div>

                    <div class="form-group">
                        <label>邮箱 *</label>
                        <input type="email" id="apiKeyEmail" placeholder="your@email.com" required>
                    </div>

                    <div class="form-group">
                        <label>Agent 类型</label>
                        <select id="apiKeyType">
                            <option value="claude">Claude</option>
                            <option value="gpt">GPT</option>
                            <option value="gemini">Gemini</option>
                            <option value="other">其他</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>描述（可选）</label>
                        <textarea id="apiKeyDesc" rows="3" placeholder="简单描述这个 API Key 的用途"></textarea>
                    </div>

                    <button type="submit" class="btn">创建 API Key</button>
                </form>

                <div id="apiKeyResult" class="hidden">
                    <h3 style="margin-top: 30px; color: #333;">✅ API Key 创建成功！</h3>
                    <div class="api-key-display" id="apiKeyDisplay"></div>
                    <button class="copy-btn" onclick="copyApiKey()">复制 API Key</button>
                    <p style="color: #f44336; margin-top: 15px;">⚠️ 请妥善保存此 API Key，关闭页面后将无法再次查看！</p>
                </div>
            </div>

            <!-- 浏览产品 -->
            <div id="browse-products" class="tab-content">
                <h2>冷钱包产品</h2>
                <div id="productsLoading" class="loading">
                    <div class="spinner"></div>
                    <p>加载产品中...</p>
                </div>
                <div id="productsGrid" class="products-grid"></div>
            </div>

            <!-- 创建订单 -->
            <div id="create-order" class="tab-content">
                <h2>创建订单</h2>
                <p style="color: #666; margin-bottom: 20px;">选择产品并填写配送信息</p>
                
                <div id="orderAlert"></div>

                <form id="orderForm">
                    <div class="form-group">
                        <label>API Key *</label>
                        <input type="text" id="orderApiKey" placeholder="fsk_..." required>
                    </div>

                    <div class="form-group">
                        <label>产品 *</label>
                        <select id="orderProduct" required>
                            <option value="">请选择产品</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>数量 *</label>
                        <input type="number" id="orderQuantity" value="1" min="1" max="10" required>
                    </div>

                    <div class="form-group">
                        <label>支付币种 *</label>
                        <select id="orderCurrency" required>
                            <option value="BTC">Bitcoin (BTC)</option>
                            <option value="ETH">Ethereum (ETH)</option>
                            <option value="BNB">BNB Chain (BNB)</option>
                            <option value="SOL">Solana (SOL)</option>
                            <option value="DOGE">Dogecoin (DOGE)</option>
                            <option value="TRX">Tron (TRX)</option>
                        </select>
                    </div>

                    <h3 style="margin: 30px 0 20px; color: #333;">配送信息</h3>

                    <div class="form-group">
                        <label>收件人姓名 *</label>
                        <input type="text" id="orderName" placeholder="张三" required>
                    </div>

                    <div class="form-group">
                        <label>联系电话 *</label>
                        <input type="tel" id="orderPhone" placeholder="+852 1234 5678" required>
                    </div>

                    <div class="form-group">
                        <label>详细地址 *</label>
                        <textarea id="orderAddress" rows="3" placeholder="香港九龙旺角弥敦道123号" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>城市</label>
                        <input type="text" id="orderCity" placeholder="Hong Kong">
                    </div>

                    <div class="form-group">
                        <label>国家/地区</label>
                        <input type="text" id="orderCountry" placeholder="Hong Kong">
                    </div>

                    <div class="form-group">
                        <label>邮政编码</label>
                        <input type="text" id="orderPostal" placeholder="000000">
                    </div>

                    <button type="submit" class="btn">创建订单</button>
                </form>

                <div id="orderResult" class="hidden"></div>
            </div>

            <!-- 查询订单 -->
            <div id="check-order" class="tab-content">
                <h2>查询订单</h2>
                
                <div id="checkOrderAlert"></div>

                <form id="checkOrderForm">
                    <div class="form-group">
                        <label>API Key *</label>
                        <input type="text" id="checkApiKey" placeholder="fsk_..." required>
                    </div>

                    <div class="form-group">
                        <label>订单号 *</label>
                        <input type="text" id="checkOrderId" placeholder="ORD20260304..." required>
                    </div>

                    <button type="submit" class="btn">查询订单</button>
                </form>

                <div id="checkOrderResult" class="hidden"></div>
            </div>
        </div>
    </div>

    <script>
        // API 配置
        const API_BASE_URL = 'https://funshell-nextjs.vercel.app';
        let currentApiKey = '';

        // 切换标签页
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');

            if (tabName === 'browse-products') {
                loadProducts();
            } else if (tabName === 'create-order') {
                // 自动填充 API Key
                if (currentApiKey) {
                    document.getElementById('orderApiKey').value = currentApiKey;
                }
                loadProductsForOrder();
            } else if (tabName === 'check-order') {
                // 自动填充 API Key
                if (currentApiKey) {
                    document.getElementById('checkApiKey').value = currentApiKey;
                }
            }
        }

        // 创建 API Key
        document.getElementById('apiKeyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('apiKeyName').value;
            const email = document.getElementById('apiKeyEmail').value;
            const agentType = document.getElementById('apiKeyType').value;
            const description = document.getElementById('apiKeyDesc').value;

            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/api-keys`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name,
                        email,
                        agentType,
                        description
                    })
                });

                const data = await response.json();

                if (data.success) {
                    currentApiKey = data.data.key;  // 修复：使用 key 而不是 apiKey
                    document.getElementById('apiKeyDisplay').textContent = currentApiKey;
                    document.getElementById('apiKeyResult').classList.remove('hidden');
                    document.getElementById('apiKeyForm').reset();
                    showAlert('apiKeyAlert', 'success', '✅ API Key 创建成功！请妥善保存。');
                } else {
                    showAlert('apiKeyAlert', 'error', '❌ 创建失败: ' + data.error);
                }
            } catch (error) {
                showAlert('apiKeyAlert', 'error', '❌ 网络错误: ' + error.message);
            }
        });

        // 复制 API Key
        function copyApiKey() {
            const apiKey = document.getElementById('apiKeyDisplay').textContent;
            navigator.clipboard.writeText(apiKey).then(() => {
                alert('API Key 已复制到剪贴板！');
            });
        }

        // 加载产品列表
        async function loadProducts() {
            const grid = document.getElementById('productsGrid');
            const loading = document.getElementById('productsLoading');
            
            loading.classList.remove('hidden');
            grid.innerHTML = '';

            try {
                // 使用临时 API Key 或提示用户创建
                const response = await fetch(`${API_BASE_URL}/api/v1/products`, {
                    headers: {
                        'X-API-Key': currentApiKey || 'demo'
                    }
                });

                const data = await response.json();
                loading.classList.add('hidden');

                if (data.success) {
                    data.data.forEach(product => {
                        const card = document.createElement('div');
                        card.className = 'product-card';
                        card.innerHTML = `
                            ${product.imageUrl ? `<img src="${product.imageUrl}" alt="${product.name}" onerror="this.style.display='none'">` : ''}
                            <h3>${product.name}</h3>
                            <p style="color: #666; font-size: 0.9rem;">${product.brand} ${product.model}</p>
                            <div class="price">${product.price} ${product.currency}</div>
                            <div class="stock ${product.stock > 0 ? 'in-stock' : 'out-of-stock'}">
                                ${product.stock > 0 ? `库存: ${product.stock}` : '缺货'}
                            </div>
                            <p style="margin-top: 10px; font-size: 0.9rem; color: #666;">${product.description}</p>
                        `;
                        grid.appendChild(card);
                    });
                } else {
                    grid.innerHTML = '<p style="color: #f44336;">加载失败，请先创建 API Key</p>';
                }
            } catch (error) {
                loading.classList.add('hidden');
                grid.innerHTML = '<p style="color: #f44336;">网络错误: ' + error.message + '</p>';
            }
        }

        // 加载产品到订单表单
        async function loadProductsForOrder() {
            const select = document.getElementById('orderProduct');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/products`, {
                    headers: {
                        'X-API-Key': currentApiKey || 'demo'
                    }
                });

                const data = await response.json();

                if (data.success) {
                    select.innerHTML = '<option value="">请选择产品</option>';
                    data.data.forEach(product => {
                        const option = document.createElement('option');
                        option.value = product.id;
                        option.textContent = `${product.name} - ${product.price} ${product.currency}`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('加载产品失败:', error);
            }
        }

        // 创建订单
        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const apiKey = document.getElementById('orderApiKey').value;
            const productId = document.getElementById('orderProduct').value;
            const quantity = parseInt(document.getElementById('orderQuantity').value);
            const currency = document.getElementById('orderCurrency').value;
            const name = document.getElementById('orderName').value;
            const phone = document.getElementById('orderPhone').value;
            const address = document.getElementById('orderAddress').value;
            const city = document.getElementById('orderCity').value;
            const country = document.getElementById('orderCountry').value;
            const postalCode = document.getElementById('orderPostal').value;

            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/orders`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': apiKey
                    },
                    body: JSON.stringify({
                        product_id: productId,
                        quantity,
                        payment_currency: currency,
                        shipping: {
                            name,
                            phone,
                            address,
                            city,
                            country,
                            postal_code: postalCode
                        }
                    })
                });

                const data = await response.json();

                if (data.success) {
                    const result = document.getElementById('orderResult');
                    result.innerHTML = `
                        <div class="payment-info">
                            <h3>💰 订单创建成功！</h3>
                            <p><strong>订单号:</strong> ${data.data.order_id}</p>
                            <p><strong>产品:</strong> ${data.data.product.name} x ${data.data.product.quantity}</p>
                            <p><strong>总价:</strong> ${data.data.total_amount.hkd} HKD</p>
                            
                            <h3 style="margin-top: 20px;">支付信息</h3>
                            <p><strong>币种:</strong> ${data.data.payment.currency}</p>
                            <p><strong>金额:</strong> ${data.data.payment.amount} ${data.data.payment.currency}</p>
                            <p><strong>地址:</strong> <span style="word-break: break-all;">${data.data.payment.address}</span></p>
                            <button class="copy-btn" onclick="copyText('${data.data.payment.address}')">复制地址</button>
                            
                            <div class="qr-code">
                                <img src="${data.data.payment.qr_code}" alt="Payment QR Code">
                            </div>
                            
                            <p style="color: #856404; margin-top: 15px;">
                                ⏰ 请在 15 分钟内完成支付<br>
                                支付后系统将自动确认订单
                            </p>
                        </div>
                    `;
                    result.classList.remove('hidden');
                    document.getElementById('orderForm').reset();
                    showAlert('orderAlert', 'success', '✅ 订单创建成功！请按照支付信息完成付款。');
                } else {
                    showAlert('orderAlert', 'error', '❌ 创建失败: ' + (data.error || JSON.stringify(data.details)));
                }
            } catch (error) {
                showAlert('orderAlert', 'error', '❌ 网络错误: ' + error.message);
            }
        });

        // 查询订单
        document.getElementById('checkOrderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const apiKey = document.getElementById('checkApiKey').value;
            const orderId = document.getElementById('checkOrderId').value;

            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/orders/${orderId}`, {
                    headers: {
                        'X-API-Key': apiKey
                    }
                });

                const data = await response.json();

                if (data.success) {
                    const order = data.data;
                    const result = document.getElementById('checkOrderResult');
                    
                    const statusText = {
                        'pending_payment': '⏳ 等待支付',
                        'paid': '✅ 已支付',
                        'processing': '📦 处理中',
                        'shipped': '🚚 已发货',
                        'completed': '✅ 已完成',
                        'cancelled': '❌ 已取消',
                        'expired': '⏰ 已过期'
                    };

                    result.innerHTML = `
                        <div style="background: #f5f5f5; padding: 20px; border-radius: 8px; margin-top: 20px;">
                            <h3>订单详情</h3>
                            <p><strong>订单号:</strong> ${order.order_number}</p>
                            <p><strong>状态:</strong> ${statusText[order.status] || order.status}</p>
                            <p><strong>产品:</strong> ${order.product.name} x ${order.quantity}</p>
                            <p><strong>总价:</strong> ${order.total_price} ${order.currency}</p>
                            
                            <h4 style="margin-top: 20px;">支付信息</h4>
                            <p><strong>币种:</strong> ${order.payment.currency}</p>
                            <p><strong>金额:</strong> ${order.payment.amount} ${order.payment.currency}</p>
                            <p><strong>地址:</strong> <span style="word-break: break-all;">${order.payment.address}</span></p>
                            <button class="copy-btn" onclick="copyText('${order.payment.address}')">复制地址</button>
                            
                            ${order.payment.qr_code ? `
                                <div class="qr-code">
                                    <img src="${order.payment.qr_code}" alt="Payment QR Code">
                                </div>
                            ` : ''}
                            
                            ${order.payment.tx_hash ? `<p><strong>交易哈希:</strong> ${order.payment.tx_hash}</p>` : ''}
                            
                            ${order.status === 'pending_payment' && !order.payment.tx_hash ? `
                                <div style="margin-top: 20px; padding: 15px; background: #fff3cd; border-radius: 8px;">
                                    <h4>✅ 确认支付</h4>
                                    <p style="margin-bottom: 10px;">完成支付后，请输入交易哈希（Transaction Hash）：</p>
                                    <input type="text" id="txHashInput" placeholder="输入交易哈希" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 6px; margin-bottom: 10px;">
                                    <button class="btn" onclick="confirmPayment('${order.order_id}', '${apiKey}')" style="width: auto; padding: 10px 20px;">提交支付确认</button>
                                </div>
                            ` : ''}
                            
                            <h4 style="margin-top: 20px;">配送信息</h4>
                            <p><strong>收件人:</strong> ${order.shipping.name}</p>
                            <p><strong>电话:</strong> ${order.shipping.phone}</p>
                            <p><strong>地址:</strong> ${order.shipping.address}, ${order.shipping.city}, ${order.shipping.country} ${order.shipping.postal_code}</p>
                            ${order.shipping.tracking_number ? `
                                <p style="background: #d4edda; padding: 10px; border-radius: 6px; margin-top: 10px;">
                                    <strong>📦 顺丰快递单号:</strong> ${order.shipping.tracking_number}
                                </p>
                            ` : ''}
                            
                            <p style="margin-top: 15px; color: #666;">
                                <strong>创建时间:</strong> ${new Date(order.created_at).toLocaleString('zh-CN')}
                            </p>
                            ${order.paid_at ? `<p style="color: #666;"><strong>支付时间:</strong> ${new Date(order.paid_at).toLocaleString('zh-CN')}</p>` : ''}
                            ${order.shipped_at ? `<p style="color: #666;"><strong>发货时间:</strong> ${new Date(order.shipped_at).toLocaleString('zh-CN')}</p>` : ''}
                        </div>
                    `;
                    result.classList.remove('hidden');
                    showAlert('checkOrderAlert', 'success', '✅ 订单查询成功！');
                } else {
                    showAlert('checkOrderAlert', 'error', '❌ 查询失败: ' + data.error);
                }
            } catch (error) {
                showAlert('checkOrderAlert', 'error', '❌ 网络错误: ' + error.message);
            }
        });

        // 显示提示信息
        function showAlert(elementId, type, message) {
            const alertDiv = document.getElementById(elementId);
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            alertDiv.style.display = 'block';
            
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }

        // 复制文本
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制到剪贴板！');
            });
        }

        // 确认支付
        async function confirmPayment(orderId, apiKey) {
            const txHash = document.getElementById('txHashInput').value.trim();
            
            if (!txHash) {
                alert('❌ 请输入交易哈希！');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/orders/${orderId}/payment`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': apiKey
                    },
                    body: JSON.stringify({
                        tx_hash: txHash
                    })
                });

                const data = await response.json();

                if (data.success) {
                    alert('✅ 支付确认成功！我们将尽快处理您的订单并安排发货。');
                    // 重新查询订单以更新显示
                    document.getElementById('checkOrderForm').dispatchEvent(new Event('submit'));
                } else {
                    alert('❌ 确认失败: ' + data.error);
                }
            } catch (error) {
                alert('❌ 网络错误: ' + error.message);
            }
        }
    </script>
</body>
</html>
